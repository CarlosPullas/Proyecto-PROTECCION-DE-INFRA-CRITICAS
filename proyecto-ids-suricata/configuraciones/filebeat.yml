filebeat.inputs:
  - type: filestream
    id: suricata-eve-json
    enabled: true
    paths:
      - /var/log/suricata/eve.json
    parsers:
      - ndjson:
          target: ""
          add_error_key: true
          overwrite_keys: true
    fields_under_root: true
    fields:
      observer.type: ids
      observer.vendor: OISF
      observer.product: Suricata
      event.module: suricata
      service.type: suricata
    close_inactive: 5m
    clean_inactive: 72h
    ignore_older: 48h

filebeat.config.modules:
  path: ${path.config}/modules.d/*.yml
  reload.enabled: false

setup.template.enabled: false
setup.ilm.enabled: false
setup.dashboards.enabled: false

output.logstash:
  hosts: ["192.168.1.22:5044"]
  ssl.enabled: false

logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
  permissions: 0640

processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_fields:
      target: ids
      fields:
        sensor_ip: 192.168.1.37
        monitored_interface: ens33
        log_source: /var/log/suricata/eve.json
